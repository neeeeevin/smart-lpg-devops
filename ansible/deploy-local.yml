- name: Deploy Smart LPG to local Minikube
  hosts: local
  gather_facts: false
  vars:
    namespace: smart-lpg
    mongo_uri: "{{ lookup('env', 'MONGO_URI') }}"
  tasks:
    - name: Check that MONGO_URI is provided
      ansible.builtin.fail:
        msg: "Set MONGO_URI in the shell before running this playbook."
      when: mongo_uri | length == 0

    - name: Start Minikube with Docker driver
      ansible.builtin.command: minikube start --driver=docker
      register: minikube_start
      changed_when: "'Done!' in minikube_start.stdout or 'Done!' in minikube_start.stderr"

    - name: Enable ingress addon
      ansible.builtin.command: minikube addons enable ingress
      register: ingress_enable
      changed_when: "'enabled' in ingress_enable.stdout or 'enabled' in ingress_enable.stderr"

    - name: Apply namespace
      ansible.builtin.command: kubectl apply -f ../k8s/namespace.yaml

    - name: Apply backend configmap
      ansible.builtin.command: kubectl apply -f ../k8s/backend-configmap.yaml

    - name: Recreate mongo secret
      ansible.builtin.shell: |
        kubectl delete secret mongo-secret -n {{ namespace }} --ignore-not-found
        kubectl create secret generic mongo-secret \
          --from-literal=MONGO_URI="{{ mongo_uri }}" \
          -n {{ namespace }}
      args:
        executable: /bin/bash

    - name: Apply backend deployment
      ansible.builtin.command: kubectl apply -f ../k8s/backend-deployment.yaml

    - name: Apply backend service
      ansible.builtin.command: kubectl apply -f ../k8s/backend-service.yaml

    - name: Apply frontend deployment
      ansible.builtin.command: kubectl apply -f ../k8s/frontend-deployment.yaml

    - name: Apply frontend service
      ansible.builtin.command: kubectl apply -f ../k8s/frontend-service.yaml

    - name: Apply ingress
      ansible.builtin.command: kubectl apply -f ../k8s/ingress.yaml

    - name: Wait for backend rollout
      ansible.builtin.command: kubectl rollout status deployment/backend -n {{ namespace }} --timeout=300s

    - name: Wait for frontend rollout
      ansible.builtin.command: kubectl rollout status deployment/frontend -n {{ namespace }} --timeout=300s

    - name: Show services
      ansible.builtin.command: kubectl get svc,ingress,pods -n {{ namespace }}
      register: cluster_status

    - name: Print cluster status
      ansible.builtin.debug:
        var: cluster_status.stdout_lines